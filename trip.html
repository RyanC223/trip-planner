<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Trip Planner</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="福岡旅遊">
  <meta name="theme-color" content="#0f1117">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B8%3C/text%3E%3C/svg%3E">
  <link rel="manifest" href="manifest.json">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCCrVQAJ_bJ6yewTcGeruSXi69v2qmwSAU&language=zh-TW&loading=async"></script>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --text: #f3f4f8;
      --muted: #a3a8b8;
      --line: #2a2f3f;
      --accent: #7c8cff;
      --done: 0.55;
      --eat: #39d98a;
      --shop: #4ea8ff;
      --sight: #ffab5c;
      --transit: #ff7bbb;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      background: radial-gradient(1200px 500px at 50% -15%, #1f2433 0%, var(--bg) 45%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang TC",
        "Noto Sans TC", "Segoe UI", Roboto, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 18px 10px 28px;
    }

    .app {
      width: 100%;
      max-width: 430px;
      background: linear-gradient(180deg, #111522, #0f1117);
      border: 1px solid #262c3d;
      border-radius: 28px;
      box-shadow: 0 16px 45px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      overflow: hidden;
      position: relative;
    }

    .header {
      padding: 18px 18px 12px;
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(180deg, rgba(15, 17, 23, 0.95), rgba(15, 17, 23, 0.82));
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .trip-title {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin: 0;
    }

    .trip-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title-edit-btn {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid #2f3650;
      background: rgba(32, 38, 55, 0.55);
      color: #e8edff;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 0.86rem;
    }

    .title-input {
      width: 100%;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
      padding: 6px 8px;
      border-radius: 10px;
      border: 1px solid #3f4865;
      background: #171d2c;
      outline: none;
    }

    @media print {
      body {
        background: white !important;
        color: black !important;
        padding: 0 !important;
      }

      .app {
        border: 0 !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        max-width: none !important;
      }

      .header {
        position: static !important;
        background: white !important;
        color: black !important;
        border-bottom: 1px solid #ddd !important;
      }

      .trip-title,
      .trip-meta,
      .room-line {
        color: black !important;
      }

      .no-print {
        display: none !important;
      }

      /* Ensure itinerary contents are printable */
      #content,
      .itinerary-item,
      .card,
      .transport {
        display: block !important;
      }

      .content {
        padding-bottom: 16px !important;
      }

      .card {
        background: white !important;
        border: 1px solid #ccc !important;
        box-shadow: none !important;
        color: black !important;
      }

      .subtitle,
      .detail-inner,
      .note-display,
      .transport,
      .transport-detail,
      .day-total,
      .ov-time,
      .ov-name,
      .ov-total,
      .ov-day-title {
        color: black !important;
      }

      .type-tag {
        background: transparent !important;
        border: 1px solid #ccc !important;
        color: black !important;
      }

      .detail {
        max-height: none !important;
        opacity: 1 !important;
        margin-top: 10px !important;
      }

      .detail.open {
        max-height: none !important;
      }

      /* Do not force day-per-page. Natural pagination only. */
      .ov-day + .ov-day {
        break-before: auto !important;
        page-break-before: auto !important;
      }
    }

    .trip-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .swap-btn {
      border: 1px solid #2f3650;
      background: rgba(32, 38, 55, 0.55);
      color: #d8deef;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .room-line {
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #c3cae2;
      font-size: 0.84rem;
    }

    .copy-btn {
      border: 1px solid #2f3650;
      background: rgba(32, 38, 55, 0.55);
      color: #e8edff;
      border-radius: 10px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 0.82rem;
    }

    .date-btn {
      border: 1px solid #2f3650;
      background: rgba(32, 38, 55, 0.55);
      color: #e8edff;
      border-radius: 10px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .toast {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 12px;
      background: rgba(26, 29, 39, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.10);
      color: #fff;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      display: none;
      z-index: 30;
      backdrop-filter: blur(10px);
    }

    .toast.show {
      display: block;
    }

    .net-banner {
      margin-top: 10px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.82rem;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(10px);
    }

    .net-banner.show {
      display: inline-block;
    }

    .net-banner.offline {
      background: rgba(146, 64, 14, 0.85);
      color: #fbbf24;
    }

    .net-banner.online {
      background: rgba(34, 197, 94, 0.22);
      color: #4ade80;
    }

    .progress-row {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-bar {
      height: 3px;
      flex: 1;
      background: rgba(148, 163, 184, 0.25);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar > div {
      height: 100%;
      width: 0%;
      background: #4ade80;
      transition: width 0.25s ease;
    }

    .progress-text {
      font-size: 0.78rem;
      color: #aab2cc;
      white-space: nowrap;
    }

    .reorder-hint {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #cbd5e1;
      display: none;
    }

    .reorder-hint.show {
      display: block;
    }

    .addr-btn {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid #424c6c;
      background: #242b3f;
      color: #dce2f6;
      cursor: pointer;
      display: inline-grid;
      place-items: center;
      font-size: 0.86rem;
      margin-left: 6px;
      vertical-align: middle;
    }

    .card.reorder .complete-btn,
    .card.reorder .edit-btn,
    .card.reorder .expand-btn {
      display: none !important;
    }

    .map-legend {
      color: #e8edff;
      font-size: 11px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      transform-origin: left center;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      border-radius: 10px;
      padding: 2px 4px;
    }

    .map-legend.pulse {
      transform: scale(1.06);
      border-color: rgba(124, 140, 255, 0.7);
      box-shadow: 0 0 0 3px rgba(124, 140, 255, 0.25);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #94a3b8;
    }

    .room-screen {
      min-height: calc(100vh - 120px);
      display: grid;
      place-items: center;
      padding: 18px 10px 90px;
    }

    .room-card {
      width: 100%;
      max-width: 430px;
      background: var(--card);
      border: 1px solid #2b3144;
      border-radius: 18px;
      padding: 16px 14px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.5);
    }

    .room-title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .room-sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .room-actions {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .room-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .room-error {
      margin-top: 10px;
      color: #fca5a5;
      font-size: 0.86rem;
      display: none;
    }

    .day-tabs-wrap {
      margin-top: 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .day-tabs-wrap::-webkit-scrollbar {
      display: none;
    }

    .day-tabs {
      display: inline-flex;
      gap: 8px;
      padding-bottom: 2px;
      align-items: flex-end;
    }

    .day-tab-col {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 64px;
    }

    .day-tab-weather {
      font-size: 0.68rem;
      color: #9aa3bd;
      line-height: 1.2;
      min-height: 1.1em;
      white-space: nowrap;
    }

    .day-tab {
      background: #202637;
      color: #ced3e6;
      border: 1px solid #2f3650;
      border-radius: 999px;
      padding: 7px 13px;
      font-size: 0.82rem;
      white-space: nowrap;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .day-tab-main {
      display: block;
      line-height: 1.15;
    }

    .day-tab-date {
      display: block;
      margin-top: 3px;
      font-size: 0.66rem;
      color: #b6c0db;
      line-height: 1;
    }

    .day-tab.active {
      background: #3b4362;
      color: #fff;
      border-color: #5e6a98;
      box-shadow: 0 6px 16px rgba(110, 128, 255, 0.25);
    }

    .subtabs {
      margin-top: 12px;
      background: #171b29;
      border: 1px solid #2a3045;
      border-radius: 999px;
      padding: 4px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    .subtab-btn {
      border: 0;
      color: #c5cbe0;
      background: transparent;
      border-radius: 999px;
      padding: 9px 8px;
      font-size: 0.84rem;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .subtab-btn.active {
      background: #2b334b;
      color: #fff;
      box-shadow: inset 0 0 0 1px #414d72;
    }

    .content {
      padding: 12px 14px 90px;
    }

    .day-empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 30px 8px;
      border: 1px dashed #31384d;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
    }

    .itinerary-item {
      margin: 10px 0;
    }

    .card {
      background: var(--card);
      border: 1px solid #2b3144;
      border-radius: 16px;
      padding: 12px;
      transition: opacity 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      cursor: grab;
    }

    .card:active {
      cursor: grabbing;
    }

    .card.done {
      opacity: var(--done);
      border-left: 3px solid #4ade80;
    }

    .card.done .time {
      text-decoration: line-through;
    }

    .card.dragging {
      opacity: 0.4;
      transform: scale(0.98);
      border-color: #56608b;
    }

    .card-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .card.reorder .card-head {
      grid-template-columns: auto auto 1fr auto;
    }

    .reorder-controls {
      display: none;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      justify-content: center;
      padding-right: 2px;
    }

    .card.reorder .reorder-controls {
      display: flex;
    }

    .move-btn {
      width: 26px;
      height: 26px;
      border-radius: 10px;
      border: 1px solid #424c6c;
      background: #242b3f;
      color: #dce2f6;
      display: grid;
      place-items: center;
      font-size: 0.76rem;
      cursor: pointer;
      user-select: none;
    }

    .move-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .time {
      font-size: 0.92rem;
      color: #d0d6ea;
      letter-spacing: 0.01em;
      font-variant-numeric: tabular-nums;
      min-width: 48px;
    }

    .place-title {
      margin: 0;
      font-weight: 760;
      font-size: 1.02rem;
      line-height: 1.28;
    }

    .subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.2;
    }

    .head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .complete-btn,
    .expand-btn {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid #424c6c;
      background: #242b3f;
      color: #dce2f6;
      display: grid;
      place-items: center;
      font-size: 0.86rem;
      cursor: pointer;
      transition: 0.16s ease;
      user-select: none;
    }

    .edit-btn {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid #424c6c;
      background: #242b3f;
      color: #dce2f6;
      display: grid;
      place-items: center;
      font-size: 0.86rem;
      cursor: pointer;
      transition: 0.16s ease;
      user-select: none;
    }

    .complete-btn.done {
      background: #22c55e;
      border-color: #4ade80;
      color: #062b14;
    }

    .expand-btn.expanded {
      transform: rotate(180deg);
    }

    .tag-row {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .type-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 650;
      color: #fff;
    }

    .type-eat {
      background: rgba(57, 217, 138, 0.22);
      border: 1px solid rgba(57, 217, 138, 0.55);
      color: #7bf2b7;
    }

    .type-shop {
      background: rgba(78, 168, 255, 0.22);
      border: 1px solid rgba(78, 168, 255, 0.55);
      color: #96ccff;
    }

    .type-sight {
      background: rgba(255, 171, 92, 0.2);
      border: 1px solid rgba(255, 171, 92, 0.55);
      color: #ffc78f;
    }

    .type-transit {
      background: rgba(255, 123, 187, 0.2);
      border: 1px solid rgba(255, 123, 187, 0.6);
      color: #ffb4d7;
    }

    .editable {
      font-size: 0.79rem;
      color: #d8deef;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px dashed #3b445f;
      background: rgba(255, 255, 255, 0.02);
      cursor: pointer;
      transition: 0.15s ease;
      user-select: none;
    }

    .editable:hover {
      border-color: #5d6a95;
      color: #fff;
    }

    .inline-input,
    .inline-select {
      font-size: 0.79rem;
      color: #f2f5ff;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid #5d6a95;
      background: #20273a;
      outline: none;
      min-width: 120px;
      max-width: 180px;
    }

    .detail {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.25s ease, opacity 0.25s ease, margin-top 0.25s ease;
      margin-top: 0;
    }

    .detail.open {
      max-height: 180px;
      opacity: 1;
      margin-top: 10px;
    }

    .detail-inner {
      border-top: 1px solid #31384c;
      padding-top: 9px;
      color: #b3b9cd;
      font-size: 0.78rem;
      line-height: 1.55;
    }

    .besttime {
      margin-top: 8px;
      color: #fbbf24;
      font-size: 0.82rem;
      font-weight: 650;
    }

    .recommend {
      margin-top: 8px;
      color: #aeb6cf;
      font-size: 0.78rem;
    }

    .note-display {
      margin-top: 8px;
      border: 1px dashed #3a425c;
      border-radius: 10px;
      padding: 7px 8px;
      color: #c1c8dd;
      cursor: pointer;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 34px;
    }

    .note-display.placeholder {
      color: #8f97b0;
    }

    .note-editor {
      width: 100%;
      margin-top: 8px;
      min-height: 84px;
      resize: vertical;
      border-radius: 10px;
      border: 1px solid #4b5679;
      background: #171d2c;
      color: #e8edff;
      padding: 8px 10px;
      font-size: 0.8rem;
      line-height: 1.5;
      outline: none;
    }

    .transport {
      margin: 8px 6px;
      border-left: 1px dashed #3f4865;
      padding-left: 10px;
      color: #bac1d9;
      font-size: 0.8rem;
      border: 1px solid #2f3650;
      border-radius: 14px;
      padding: 10px 10px 10px 12px;
      background: rgba(255, 255, 255, 0.02);
    }

    .transport-detail {
      margin-top: 4px;
      color: #6b7280;
      font-size: 12px;
      padding-left: 2px;
    }

    .transport.overnight {
      background: #92400e;
      color: #fbbf24;
      border-left: 3px solid #fbbf24;
      padding: 10px 10px 10px 12px;
      border-radius: 12px;
    }

    .transport.overnight .route-chip {
      border-color: rgba(251, 191, 36, 0.65);
      color: #fff6cf;
    }

    .transport.overnight .transport-detail {
      color: #fde68a;
    }

    .transport-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: default;
      border-radius: 9px;
      padding: 0 0 6px;
      transition: 0.15s ease;
    }

    .transport-main:hover {
      background: transparent;
    }

    .transport-left {
      display: block;
      flex: 1;
      min-width: 0;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }

    .transport-line {
      display: inline-block;
    }

    .transport-timeline {
      position: relative;
      margin-left: 2px;
      padding-left: 14px;
      border-left: 1px solid #3f4865;
    }

    .seg-row {
      position: relative;
      padding: 6px 0 10px 0;
    }

    .seg-dot {
      position: absolute;
      left: -19px;
      top: 11px;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      border: 2px solid #0f1117;
      background: #60a5fa;
    }

    .seg-main {
      font-size: 0.82rem;
      color: #dbe3fb;
      font-weight: 650;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .seg-sub {
      margin-top: 3px;
      font-size: 0.75rem;
      color: #9aa4c0;
    }

    .transfer-node {
      margin: 4px 0 2px;
      font-size: 0.74rem;
      color: #f59e0b;
      font-weight: 650;
    }

    .transport-total {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed #3a425c;
      font-size: 0.8rem;
      color: #c7d0ec;
      text-align: right;
    }

    .transport.overnight .seg-sub,
    .transport.overnight .transport-total {
      color: #fde68a;
    }

    function migrateTransportSegment(seg) {
      if (Array.isArray(seg.segments)) {
        return {
          id: seg.id,
          segments: seg.segments,
          isOvernightTrain: !!seg.isOvernightTrain,
          alternatives: Array.isArray(seg.alternatives) ? seg.alternatives : []
        };
      }
      if (seg.main && typeof seg.main === "object") {
        const m = seg.main;
        return {
          id: seg.id,
          segments: [
            {
              icon: m.icon ?? "",
              mode: m.mode ?? "",
              from: "",
              to: "",
              duration: m.duration ?? "",
              cost: m.cost ?? ""
            }
          ],
          isOvernightTrain: !!seg.isOvernightTrain,
          alternatives: Array.isArray(seg.alternatives) ? seg.alternatives : []
        };
      }
      return {
        id: seg.id,
        segments: [
          {
            icon: seg.icon ?? "",
            mode: seg.mode ?? "",
            from: "",
            to: "",
            duration: seg.duration ?? "",
            cost: seg.cost ?? ""
          }
        ],
        isOvernightTrain: !!seg.isOvernightTrain,
        alternatives: Array.isArray(seg.alternatives) ? seg.alternatives : []
      };
    }

    function migrateStateIfNeeded(state) {
      try {
        console.log("目前 dataVersion:", state.dataVersion);
        const prev = Number(state.dataVersion || 0);

        // v3 migration: normalize transport structure (legacy safety)
        if (prev < 3) {
          state.transportByDay = structuredClone(defaultData.transportByDay);
        }

        // v4 migration: add lat/lng for day1 spots
        if (prev < 4) {
          const coordFallback = {
            "大濠公園散步": { lat: 33.5841, lng: 130.3686 },
            "大濠公園": { lat: 33.5841, lng: 130.3686 },
            "一蘭拉麵 本社總本店": { lat: 33.5897, lng: 130.4201 },
            "一蘭拉麵本社總本店": { lat: 33.5897, lng: 130.4201 },
            "天神地下街": { lat: 33.5903, lng: 130.3987 }
          };

          const day1 = state.itineraryByDay?.[1];
          if (Array.isArray(day1)) {
            day1.forEach((spot) => {
              if (!spot) return;
              const needLat = spot.lat == null;
              const needLng = spot.lng == null;
              if (!needLat && !needLng) return;
              const fb = coordFallback[spot.title];
              if (!fb) return;
              if (needLat) spot.lat = fb.lat;
              if (needLng) spot.lng = fb.lng;
            });
          }
        }

        // v5 migration: transport.main -> transport.segments
        if (prev < 5 && state.transportByDay) {
          for (const day of Object.keys(state.transportByDay)) {
            const list = Array.isArray(state.transportByDay[day]) ? state.transportByDay[day] : [];
            state.transportByDay[day] = list.map((seg) => {
              if (!seg) return seg;
              if (Array.isArray(seg.segments)) return seg;
              if (seg.main && typeof seg.main === "object") {
                return {
                  ...seg,
                  segments: [
                    {
                      icon: seg.main.icon ?? "",
                      mode: seg.main.mode ?? "",
                      from: "",
                      to: "",
                      duration: seg.main.duration ?? "",
                      cost: seg.main.cost ?? ""
                    }
                  ]
                };
              }
              return {
                ...seg,
                segments: [
                  {
                    icon: seg.icon ?? "",
                    mode: seg.mode ?? "",
                    from: "",
                    to: "",
                    duration: seg.duration ?? "",
                    cost: seg.cost ?? ""
                  }
                ]
              };
            });
          }
        }

        // v6 migration: 若 transportByDay 所有天都是空陣列，
        // 代表 Firebase 資料損壞，從 defaultData 重置
        if (prev < 6) {
          const allEmpty = Object.values(state.transportByDay || {})
            .every(arr => !Array.isArray(arr) || arr.length === 0);
          if (allEmpty) {
            state.transportByDay = structuredClone(defaultData.transportByDay);
            console.log("transportByDay 已從 defaultData 重置");
          }
        }

        if (prev < DATA_VERSION) {
          state.dataVersion = DATA_VERSION;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          if (db && roomId) {
            db.ref("rooms/" + roomId).set(state);
          }
        }
      } catch (e) {
        console.error("Migration error:", e);
      }
      return state;
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultData));
        return structuredClone(defaultData);
      }
      try {
        const parsed = JSON.parse(raw);
        return normalizeFirebaseArrays(migrateStateIfNeeded(parsed));
      } catch (err) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultData));
        return structuredClone(defaultData);
      }
    }

    function isAnyModalOpen() {
      return (
        document.getElementById("spotModal")?.classList.contains("show") ||
        document.getElementById("transportModal")?.classList.contains("show") ||
        document.getElementById("startDateModal")?.classList.contains("show")
      );
    }

    function normalizeFirebaseArrays(s) {
      const toArr = (val) => {
        if (!val) return [];
        if (Array.isArray(val)) return val;
        return Object.keys(val)
          .sort((a, b) => Number(a) - Number(b))
          .map((k) => val[k]);
      };

      if (s.itineraryByDay) {
        for (const key of Object.keys(s.itineraryByDay)) {
          s.itineraryByDay[key] = toArr(s.itineraryByDay[key]);
        }
      }

      if (!s.transportByDay) {
        s.transportByDay = { 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] };
      }
      if (s.transportByDay) {
        for (const key of Object.keys(s.transportByDay)) {
          const seg = s.transportByDay[key];
          if (seg && !Array.isArray(seg)) {
            s.transportByDay[key] = toArr(seg);
          }
          if (Array.isArray(s.transportByDay[key])) {
            s.transportByDay[key] = s.transportByDay[key].map((t) => {
              if (!t) return t;
              if (!Array.isArray(t.segments)) {
                if (t.main && typeof t.main === "object") {
                  t.segments = [
                    {
                      icon: t.main.icon ?? "",
                      mode: t.main.mode ?? "",
                      from: "",
                      to: "",
                      duration: t.main.duration ?? "",
                      cost: t.main.cost ?? ""
                    }
                  ];
                } else {
                  t.segments = [];
                }
              } else if (t.segments && !Array.isArray(t.segments)) {
                t.segments = toArr(t.segments);
              }
              if (t.alternatives && !Array.isArray(t.alternatives)) {
                t.alternatives = toArr(t.alternatives);
              }
              return t;
            });
          }
        }
      }
      return s;
    }

    function dayItems(day) {
      if (day === 0) return [];
      return state.itineraryByDay[day] || [];
    }

    function dayTransports(day) {
      return (state.transportByDay || {})[day] || [];
    }

    function swapArrayItems(arr, a, b) {
      const tmp = arr[a];
      arr[a] = arr[b];
      arr[b] = tmp;
    }

    function moveSpot(day, index, dir) {
      const items = dayItems(day);
      const transports = dayTransports(day);
      const next = index + dir;
      if (next < 0 || next >= items.length) return;

      swapArrayItems(items, index, next);

      const a = Math.min(index, next);
      // keep transport segments roughly in sync with item order
      if (transports[a] && transports[a + 1]) {
        swapArrayItems(transports, a, a + 1);
      }

      reorderDirty = true;
      render();
    }

    function renderGeoUI(message = "") {
      const status = document.getElementById("geoStatus");
      const results = document.getElementById("geoResults");
      if (!status || !results) return;

    function doGeoSearch() {
      const name = (document.getElementById("f_name")?.value || "").trim();
      if (!name) return;

      renderGeoUI("🔍 搜尋中…");
      document.getElementById("geoResults").style.display = "none";

      if (!window.google?.maps?.Geocoder) {
        renderGeoUI("搜尋失敗，請手動確認位置");
        return;
      }

      const geocoder = new google.maps.Geocoder();
      geocoder.geocode(
        { address: name + " 日本", region: "jp", language: "zh-TW" },
        (results, status) => {
          if (status !== "OK" || !results?.length) {
            renderGeoUI("找不到結果，請換個名稱再試");
            return;
          }

          const mapped = results.slice(0, 3).map((r) => {
            const loc = r.geometry?.location;
            return {
              ...r,
              geometry: {
                ...(r.geometry || {}),
                location: {
                  lat: typeof loc?.lat === "function" ? loc.lat() : loc?.lat ?? null,
                  lng: typeof loc?.lng === "function" ? loc.lng() : loc?.lng ?? null
                }
              }
            };
          });
          showGeoResults(mapped);
          renderGeoUI("");
        }
      );
    }

    function typeClass(type) {
      if (type === "餐飲") return "type-eat";
      if (type === "購物") return "type-shop";
      if (type === "交通") return "type-transit";
      return "type-sight";

    function typeDotColor(type) {
      if (type === "餐飲") return "#4ade80";
      if (type === "購物") return "#60a5fa";
      if (type === "交通") return "#f472b6";
      return "#fb923c";
    }

    function localDayStart(d = new Date()) {
      const x = new Date(d);
      x.setHours(0, 0, 0, 0);
      return x;
    }

    function parseYMD(ymd) {
      if (!ymd || !/^\d{4}-\d{2}-\d{2}$/.test(ymd)) return null;
      const [y, m, d] = ymd.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function formatMD(dateObj) {
      return `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
    }

    function tripDateForDay(dayIndex) {
      const start = parseYMD(state.startDate);
      const base = start || localDayStart();
      const d = new Date(base);
      d.setDate(d.getDate() + (dayIndex - 1));
      return d;
    }

    function weekdayLabelForTripDay(dayIndex) {
      const d = tripDateForDay(dayIndex);
      const w = ["日", "一", "二", "三", "四", "五", "六"][d.getDay()];
      return `星期${w}`;
    }

    function weatherIconFromCode(code) {
      const c = Number(code);
      if (c === 0) return "☀️";
      if ([1, 2, 3].includes(c)) return "⛅";
      if ([45, 48].includes(c)) return "🌫️";
      if ([51, 53, 55, 61, 63, 65].includes(c)) return "🌧️";
      if ([71, 73, 75].includes(c)) return "❄️";
      if ([80, 81, 82].includes(c)) return "🌦️";
      if ([95, 96, 99].includes(c)) return "⛈️";
      return "⛅";
    }

    function fetchWeatherForecast() {
      if (!roomId) return;
      const hasStartDate = !!state.startDate;
      const start = parseYMD(state.startDate);
      const today = localDayStart();
      const rawOffset = start ? Math.floor((start - today) / 86400000) : 0;
      const offset = Number.isFinite(rawOffset) ? rawOffset : 0;
      const tooFar = hasStartDate && offset > 14;

      weatherMeta = { hasStartDate, offsetDays: offset, startTooFar: tooFar };
      if (tooFar) {
        weatherCache = {};
        renderHeader();
        return;
      }

      const needed = hasStartDate ? Math.min(16, Math.max(7, offset + state.days + 2)) : 7;
      const url =
        `https://api.open-meteo.com/v1/forecast?latitude=33.59&longitude=130.40&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&forecast_days=${needed}`;
      fetch(url)
        .then((r) => r.json())
        .then((json) => {
          const daily = json.daily;
          if (!daily || !daily.weathercode) return;
          weatherCache = {};
          for (let day = 1; day <= state.days; day += 1) {
            const idx = hasStartDate ? Math.max(0, offset + day - 1) : day - 1;
            if (idx < 0 || idx >= daily.weathercode.length) continue;
            weatherCache[day] = {
              icon: weatherIconFromCode(daily.weathercode[idx]),
              max: Math.round(daily.temperature_2m_max[idx]),
              min: Math.round(daily.temperature_2m_min[idx])
            };
          }
          renderHeader();
        })
        .catch(() => {});
    }

    function renderHeader() {
      document.getElementById("tripTitle").textContent = state.tripName;
      document.getElementById("tripMeta").textContent = `${state.days} 天行程  ·  ${state.people} 人`;

      // progress

      const done = allItems.filter((i) => i && i.done).length;

      const fill = document.getElementById("progressFill");
      const txt = document.getElementById("progressText");
      if (row && fill && txt && roomId) {
        row.style.display = total ? "flex" : "none";

        fill.style.width = `${pct}%`;
        txt.textContent = `已完成 ${done} / ${total} 個景點`;
      } else if (row) {
        row.style.display = "none";

      const hint = document.getElementById("reorderHint");
      if (hint) hint.classList.toggle("show", !!state.reorderMode && state.activeDay > 0);

      const dayTabsEl = document.getElementById("dayTabs");
      dayTabsEl.innerHTML = "";

      const overviewCol = document.createElement("div");

      overviewBtn.type = "button";

      overviewBtn.addEventListener("click", () => {

        reorderDirty = false;

        state.activeDay = 0;
        saveState();
        render();
      });
      const overviewWeather = document.createElement("div");
      overviewWeather.className = "day-tab-weather";
      overviewWeather.innerHTML = "&nbsp;";
      overviewCol.appendChild(overviewBtn);
      overviewCol.appendChild(overviewWeather);
      dayTabsEl.appendChild(overviewCol);

      for (let i = 1; i <= state.days; i += 1) {
        const col = document.createElement("div");
        col.className = "day-tab-col";
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `day-tab${state.activeDay === i ? " active" : ""}`;
        if (state.startDate) {
          btn.innerHTML = `<span class="day-tab-main">第${i}天</span><span class="day-tab-date">${formatMD(tripDateForDay(i))}</span>`;
        } else {
          btn.textContent = `第${i}天`;
        }
        btn.addEventListener("click", () => {
          state.activeDay = i;
          saveState();
          render();
        });
        const wEl = document.createElement("div");
        wEl.className = "day-tab-weather";
        const w = weatherCache && weatherCache[i];
        if (weatherMeta.startTooFar) {
          wEl.textContent = `距出發還有${weatherMeta.offsetDays}天`;
        } else if (w) {
          wEl.textContent = weatherMeta.hasStartDate
            ? `${w.icon} ${w.max}°/${w.min}°`
            : `（未設出發日） ${w.icon} ${w.max}°/${w.min}°`;
        } else {
          wEl.textContent = "\u00a0";
        }
        col.appendChild(btn);
        col.appendChild(wEl);
        dayTabsEl.appendChild(col);
      }

      document.querySelectorAll(".subtab-btn").forEach((btn) => {
        const active = btn.dataset.view === state.activeView;
        btn.classList.toggle("active", active);
      });
    }

    function renderOverview() {
      const content = document.getElementById("content");
      content.innerHTML = "";
      const root = document.createElement("div");
      root.className = "overview-root";

      for (let d = 1; d <= state.days; d += 1) {
        const items = dayItems(d);
        const dayBlock = document.createElement("section");
        dayBlock.className = "ov-day";

        const title = document.createElement("h3");
        title.className = "ov-day-title";
        if (state.startDate) {
          title.textContent = `第${d}天 · ${formatMD(tripDateForDay(d))}（${weekdayLabelForTripDay(d)}）`;
        } else {
          title.textContent = `第${d}天 · ${weekdayLabelForTripDay(d)}（今天起算）`;
        }

    function createTransportNode(transport, index) {
      const segments = Array.isArray(transport.segments)
        ? transport.segments
        : transport.main
          ? [{
            icon: transport.main.icon ?? "",
            mode: transport.main.mode ?? "",
            from: "",
            to: "",
            duration: transport.main.duration ?? "",
            cost: transport.main.cost ?? ""
          }]
          : [];
      const isOvernightTrain = !!transport.isOvernightTrain;
      const wrapper = document.createElement("div");
      wrapper.className = `transport${isOvernightTrain ? " overnight" : ""}`;

      const mainRow = document.createElement("div");
      mainRow.className = "transport-main";
      mainRow.innerHTML = `
        <div class="transport-left">
          <span class="transport-line">${isOvernightTrain ? "⚠ 跨日交通" : "交通路線"}</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="edit-btn no-print" type="button" title="編輯">✎ 編輯</button>
        </div>
      `;

      const timeline = document.createElement("div");
      timeline.className = "transport-timeline";
      let totalMins = 0;
      let totalCost = 0;

      segments.forEach((seg, i) => {
        const row = document.createElement("div");
        row.className = "seg-row";
        const dot = document.createElement("span");
        dot.className = "seg-dot";
        dot.style.background = transportDotColor(seg.mode, seg.icon);

        const main = document.createElement("div");
        main.className = "seg-main";
        main.textContent = `${seg.icon || ""} ${seg.mode || ""} ${seg.duration || ""} ${seg.cost || ""}`.replace(/\s+/g, " ").trim();

        const sub = document.createElement("div");
        sub.className = "seg-sub";
        const subLine = `${seg.from || ""} ${seg.to ? `→ ${seg.to}` : ""}`.trim();
        sub.textContent = subLine || " ";

        row.appendChild(dot);
        row.appendChild(main);
        row.appendChild(sub);
        timeline.appendChild(row);

        totalMins += parseDurationMinutes(seg.duration);
        totalCost += parseYen(seg.cost);

        if (i < segments.length - 1) {
          const transfer = document.createElement("div");
          transfer.className = "transfer-node";
          transfer.textContent = `◇ 轉乘 ${seg.to || "中繼站"}`;
          timeline.appendChild(transfer);
        }
      });

      const total = document.createElement("div");
      total.className = "transport-total";
      total.textContent = `合計 ${totalMins}分鐘  ${formatCurrency(totalCost)}`;
      timeline.appendChild(total);

        e.stopPropagation();
        openTransportModal(state.activeDay, index);
      });

      wrapper.append(mainRow);
      wrapper.append(timeline);
      wrapper.dataset.transportIndex = String(index);
      return wrapper;
    }

    const TRANSPORT_OPTIONS = [
      { icon: "🚶", label: "步行", defaultName: "步行" },
      { icon: "🚇", label: "地鐵／捷運", defaultName: "捷運-XX線" },
      { icon: "🚃", label: "電車／JR", defaultName: "電車-XX線" },
      { icon: "🚌", label: "巴士", defaultName: "巴士" },
      { icon: "🚕", label: "計程車", defaultName: "計程車" },
      { icon: "🚗", label: "自駕", defaultName: "自駕" },
      { icon: "🚲", label: "腳踏車", defaultName: "腳踏車" },
      { icon: "✈️", label: "飛機", defaultName: "航班-XXXX" },
      { icon: "⛴", label: "渡輪／船", defaultName: "渡輪" },
      { icon: "🚡", label: "纜車", defaultName: "纜車" }
    ];

    function transportPlaceholders(icon) {
      if (icon === "🚇" || icon === "🚃") return { from: "如：渋谷站", to: "如：品川站" };
      if (icon === "🚌") return { from: "如：天神巴士站", to: "如：博多站前" };
      if (icon === "🚶" || icon === "🚗" || icon === "🚲") return { from: "如：大濠公園", to: "如：一蘭拉麵" };
      if (icon === "🚕") return { from: "如：飯店門口", to: "如：目的地" };
      if (icon === "✈️") return { from: "如：福岡機場 FUK", to: "如：東京成田 NRT" };
      if (icon === "⛴" || icon === "🚡") return { from: "如：乘船處", to: "如：碼頭" };
      return { from: "如：起點", to: "如：目的地" };
    }

    function optionByIcon(icon) {
      return TRANSPORT_OPTIONS.find((o) => o.icon === icon) || TRANSPORT_OPTIONS[0];
    }

    function renderTransportSegmentsEditor(segments) {
      const host = document.getElementById("transportSegments");
      host.innerHTML = "";
      segments.forEach((seg, idx) => {
        const opt = optionByIcon(seg.icon);
        seg.icon = opt.icon;
        const ph = transportPlaceholders(seg.icon);
        const selectHtml = TRANSPORT_OPTIONS.map((o) =>
          `<option value="${escapeHtml(o.icon)}"${o.icon === seg.icon ? " selected" : ""}>${escapeHtml(o.icon)} ${escapeHtml(o.label)}</option>`
        ).join("");
        const card = document.createElement("div");
        card.className = "seg-edit-card";
        card.innerHTML = `
          <div class="seg-edit-head">
            <span>第 ${idx + 1} 段</span>
            <button type="button" class="modal-close transport-seg-del" data-idx="${idx}" aria-label="Delete">✕</button>
          </div>
          <div class="seg-grid">
            <div class="field"><label>交通工具</label><select data-k="icon" data-idx="${idx}">${selectHtml}</select></div>
            <div class="field"><label>路線名稱</label><input data-k="mode" data-idx="${idx}" data-user-edited="false" value="${escapeHtml(seg.mode || "")}" placeholder="山手線" /></div>
            <div class="field"><label>起點</label><input data-k="from" data-idx="${idx}" value="${escapeHtml(seg.from || "")}" placeholder="${escapeHtml(ph.from)}" /></div>
            <div class="field"><label>到達</label><input data-k="to" data-idx="${idx}" value="${escapeHtml(seg.to || "")}" placeholder="${escapeHtml(ph.to)}" /></div>
            <div class="field"><label>所需時間</label><input data-k="duration" data-idx="${idx}" value="${escapeHtml(seg.duration || "")}" placeholder="12分鐘" /></div>
            <div class="field"><label>費用</label><input data-k="cost" data-idx="${idx}" value="${escapeHtml(seg.cost || "")}" placeholder="¥200" /></div>
          </div>
        `;
        host.appendChild(card);
        if (idx < segments.length - 1) {
          const node = document.createElement("div");
          node.className = "transfer-node";
          node.style.margin = "2px 2px 10px";
          node.textContent = `◇ 轉乘 ${segments[idx].to || "中繼站"}`;
          host.appendChild(node);
        }
      });
      host.querySelectorAll(".transport-seg-del").forEach((btn) => {
        btn.addEventListener("click", () => {
          const i = Number(btn.dataset.idx);
          const arr = transportModalCtx.segments || [];
          if (arr.length <= 1) return;
          arr.splice(i, 1);
          renderTransportSegmentsEditor(arr);
        });
      });
      host.querySelectorAll('select[data-k="icon"]').forEach((sel) => {
        sel.addEventListener("change", () => {
          const i = Number(sel.dataset.idx);
          const arr = transportModalCtx.segments || [];
          const target = arr[i];
          if (!target) return;
          const prevOpt = optionByIcon(target.icon);
          const nextOpt = optionByIcon(sel.value);
          target.icon = nextOpt.icon;

          const modeInput = host.querySelector(`input[data-k="mode"][data-idx="${i}"]`);
          const currMode = String(target.mode || "").trim();
          const modeNotUserEdited = !modeInput || modeInput.dataset.userEdited !== "true";
          if (!currMode || modeNotUserEdited) {
            target.mode = nextOpt.defaultName;
            if (modeInput) modeInput.value = nextOpt.defaultName;
          }

          const ph = transportPlaceholders(nextOpt.icon);
          const fromInput = host.querySelector(`input[data-k="from"][data-idx="${i}"]`);
          const toInput = host.querySelector(`input[data-k="to"][data-idx="${i}"]`);
          if (fromInput) fromInput.placeholder = ph.from;
          if (toInput) toInput.placeholder = ph.to;
        });
      });
      host.querySelectorAll("input[data-k]").forEach((inp) => {
        inp.addEventListener("input", () => {
          const i = Number(inp.dataset.idx);
          const k = inp.dataset.k;
          if (!transportModalCtx.segments[i]) return;
          transportModalCtx.segments[i][k] = inp.value;
          if (k === "mode") inp.dataset.userEdited = "true";
        });
      });
    }

    function openTransportModal(day, index) {
      transportModalCtx = { day, index };
      const seg = dayTransports(day)[index];
      if (!seg) return;
      transportModalCtx.segments = (Array.isArray(seg.segments) && seg.segments.length
        ? structuredClone(seg.segments)
        : seg.main
          ? [{
            icon: seg.main.icon || "",
            mode: seg.main.mode || "",
            from: "",
            to: "",
            duration: seg.main.duration || "",
            cost: seg.main.cost || ""
          }]
          : [{ icon: "", mode: "", from: "", to: "", duration: "", cost: "" }]
      ).slice(0, 5);

      document.getElementById("t_overnight").checked = !!seg.isOvernightTrain;
      renderTransportSegmentsEditor(transportModalCtx.segments);

      const overlay = document.getElementById("transportModal");
      overlay.classList.add("show");
      overlay.setAttribute("aria-hidden", "false");
    }

    function closeTransportModal() {
      const overlay = document.getElementById("transportModal");
      overlay.classList.remove("show");
      overlay.setAttribute("aria-hidden", "true");
    }

    function formatCurrency(num) {
      return `¥${num.toLocaleString("en-US")}`;
    }

    function parseYen(value) {
      if (!value) return 0;
      if (value.includes("免費") || value.includes("自由購物")) return 0;
      if (!value.includes("¥")) return 0;
      const matched = value.replace(/,/g, "").match(/¥\s*([\d.]+)/);
      if (!matched) return 0;
      return Number(matched[1]) || 0;
    }

    function parseDurationMinutes(value) {
      if (!value) return 0;
      const m = String(value).match(/(\d+(?:\.\d+)?)/);
      if (!m) return 0;
      return Math.round(Number(m[1]) || 0);
    }

    function transportDotColor(mode, icon) {
      const src = `${mode || ""} ${icon || ""}`;
      if (src.includes("步行") || src.includes("🚶")) return "#9ca3af";
      if (src.includes("計程車") || src.includes("🚕")) return "#facc15";
      return "#60a5fa";
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function getRecommendation(item) {
      const t = item?.type;
      if (t === "餐飲") return "避開尖峰時段，先確認排隊狀況。";
      if (t === "購物") return "可先列清單，再集中採買與退稅。";
      if (t === "交通") return "留意末班車／轉乘時間。";
      return "光線好的時段拍照更漂亮。";
    }

    function makeEditable(el, day, itemId, field) {
      el.addEventListener("click", () => {
        const list = dayItems(day);
        const item = list.find((i) => i.id === itemId);
        if (!item) return;
        const current = item[field] || "";
        let editor;

        if (field === "stay") {
          editor = document.createElement("select");
          editor.className = "inline-select";
          const stayOptions = [
            "15分",
            "30分",
            "45分",
            "1小時",
            "1.5小時",
            "2小時",
            "3小時以上"
          ];
          if (current && !stayOptions.includes(current)) {
            stayOptions.unshift(current);
          }
          stayOptions.forEach((opt) => {
            const op = document.createElement("option");
            op.value = opt;
            op.textContent = opt;
            editor.appendChild(op);
          });
          editor.value = current || "45分";
        } else {
          editor = document.createElement("input");
          editor.className = "inline-input";
          editor.type = "text";
          editor.placeholder = "如 ¥800/人 或 免費";
          editor.value = current;
        }

        const saveInline = () => {
          const next = (editor.value || "").trim();
          item[field] = next || (field === "stay" ? "45分" : "未設定");
          saveState();
          render();
        };

        editor.addEventListener("keydown", (ev) => {
          if (ev.key === "Enter") {
            ev.preventDefault();
            saveInline();
          }
        });
        editor.addEventListener("blur", saveInline, { once: true });

        el.replaceWith(editor);
        editor.focus();
        if (editor.select) editor.select();
      });
    }

    function makeNoteEditable(day, itemId, noteDisplayEl) {
      noteDisplayEl.addEventListener("click", () => {
        const item = dayItems(day).find((i) => i.id === itemId);
        if (!item) return;

        const textarea = document.createElement("textarea");
        textarea.className = "note-editor";
        textarea.placeholder = "點擊新增備註…";
        textarea.value = item.note || "";

        const saveNote = () => {
          item.note = textarea.value.trim();
          saveState();
          render();
        };

        textarea.addEventListener("keydown", (ev) => {
          if ((ev.metaKey || ev.ctrlKey) && ev.key === "Enter") {
            ev.preventDefault();
            saveNote();
          }
        });
        textarea.addEventListener("blur", saveNote, { once: true });

        noteDisplayEl.replaceWith(textarea);
        textarea.focus();
      });
    }

        addrBtn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const text = `${item.title}${item.subtitle ? " " + item.subtitle : ""}`.trim();
          try {
            await navigator.clipboard.writeText(text);
            showToast("已複製！");
          } catch (err) {
            showToast("複製失敗");
          }
        });
      }

      if (upBtn) {
        upBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          const at = dayItems(day).findIndex((i) => i.id === item.id);
          if (at <= 0) return;
          moveSpot(day, at, -1);
        });
      }

      if (downBtn) {
        downBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          const at = dayItems(day).findIndex((i) => i.id === item.id);
          if (at < 0 || at >= dayItems(day).length - 1) return;
          moveSpot(day, at, +1);
        });
      }

      return card;
    }

    function renderItinerary() {
      try {
        if (!state.activeDay) return;
        const content = document.getElementById("content");
        content.innerHTML = "";
        const day = state.activeDay;
        const items = dayItems(day);
        const transports = dayTransports(day);

        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "day-empty";
          empty.textContent = `第${day}天目前尚無行程`;
          content.appendChild(empty);
          return;
        }

        items.forEach((item, idx) => {
          const block = document.createElement("div");
          block.className = "itinerary-item";
          block.appendChild(createCardNode(item, day));
          content.appendChild(block);

          if (idx < items.length - 1 && transports[idx]) {
            content.appendChild(createTransportNode(transports[idx], idx));
          }
        });

        const addBtn = document.createElement("button");
        addBtn.className = "add-spot-btn";
        addBtn.type = "button";
        addBtn.textContent = "＋ 新增景點";
        addBtn.addEventListener("click", () => openSpotModal(day, null));
        content.appendChild(addBtn);

        const totalPerPerson = items.reduce((sum, i) => sum + parseYen(i.cost), 0);
        const totalEl = document.createElement("div");
        totalEl.className = "day-total";
        totalEl.textContent = `今日費用小計 ${formatCurrency(totalPerPerson)}／人`;
        content.appendChild(totalEl);
      } catch (e) {
        console.error(
          "Render error:",
          e,
          "state.itineraryByDay[day]:",
          JSON.stringify(state.itineraryByDay[state.activeDay])
        );
        const c = document.getElementById("content");
        if (c) {
          c.innerHTML =
            '<p style="color:#a3a8b8;padding:20px">載入失敗，請重新整理</p>';
        }
      }
    }

    const MAP_STYLE_NIGHT = [
      { elementType: "geometry", stylers: [{ color: "#1d2c4d" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#8ec3b9" }] },
      { elementType: "labels.text.stroke", stylers: [{ color: "#1a3646" }] },
      { featureType: "road", elementType: "geometry", stylers: [{ color: "#304a7d" }] },
      { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#98a5be" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#0e1626" }] },
      { featureType: "poi", elementType: "geometry", stylers: [{ color: "#283d6a" }] }
    ];

    function mapPinColor(type) {
      if (type === "餐飲") return "#4ade80";
      if (type === "購物") return "#60a5fa";
      if (type === "交通") return "#f472b6";
      return "#fb923c";
    }

    function svgMarkerDataUrl(number, color) {
      const n = String(number);
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
          <circle cx="18" cy="18" r="16" fill="${color}" />
          <text x="18" y="23" text-anchor="middle"
                font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial"
                font-size="14" font-weight="800" fill="#ffffff">${n}</text>
        </svg>
      `.trim();
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function clearMapMarkers() {
      gMarkers.forEach((m) => m.setMap(null));
      gMarkers = [];
    }

    function ensureMapInitialized() {
      const mapEl = document.getElementById("gmap");
      if (!mapEl) return;
      if (!window.google || !window.google.maps) return;
      if (gmap) return;

      gmap = new google.maps.Map(mapEl, {
        center: { lat: 33.5904, lng: 130.4017 },
        zoom: 13,
        styles: MAP_STYLE_NIGHT,
        mapTypeId: "roadmap",
        disableDefaultUI: true,
        zoomControl: true,
        gestureHandling: "greedy"
      });
      gInfoWindow = new google.maps.InfoWindow();
    }

    function updateMapMarkersForDay(day) {
      ensureMapInitialized();
      if (!gmap) return;

      clearMapMarkers();
      if (gInfoWindow) gInfoWindow.close();

      const items = dayItems(day);
      let bounds = new google.maps.LatLngBounds();
      let hasAny = false;

      items.forEach((item, idx) => {
        if (item.lat == null || item.lng == null) return;
        const pos = { lat: Number(item.lat), lng: Number(item.lng) };
        if (!Number.isFinite(pos.lat) || !Number.isFinite(pos.lng)) return;
        if (!pos) return;

        const color = mapPinColor(item.type);
        const marker = new google.maps.Marker({
          map: gmap,
          position: pos,
          title: item.title,
          icon: {
            url: svgMarkerDataUrl(idx + 1, color),
            scaledSize: new google.maps.Size(36, 36),
            anchor: new google.maps.Point(18, 18)
          }
        });

        marker.addListener("click", () => {
          if (!gInfoWindow) return;
          const safeTime = String(item.time || "");
          const safeTitle = String(item.title || "");
          const safeType = String(item.type || "");
          const safeCost = String(item.cost || "");
          const navUrl = `https://maps.google.com/?q=${encodeURIComponent(safeTitle)}`;
          const html = `
            <div style="background:#1a1d27;color:#fff;padding:12px;border-radius:8px;min-width:200px">
              <div style="font-size:12px;color:#94a3b8">${safeTime}</div>
              <div style="font-size:16px;font-weight:bold;margin:4px 0">${safeTitle}</div>
              <div style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;background:${color}">${safeType}</div>
              <div style="margin-top:8px;font-size:13px;color:#94a3b8">${safeCost}</div>
              <a href="${navUrl}" target="_blank"
                 style="display:block;margin-top:10px;background:#3b82f6;color:#fff;
                        text-align:center;padding:8px;border-radius:6px;text-decoration:none;font-size:13px">
                Google Maps 導航
              </a>
            </div>
          `;
          gInfoWindow.setContent(html);
          gInfoWindow.open({ map: gmap, anchor: marker });
        });

        gMarkers.push(marker);
        bounds.extend(pos);
        hasAny = true;
      });

      if (hasAny) {
        gmap.fitBounds(bounds, 60);
      } else {
        gmap.setCenter({ lat: 33.5904, lng: 130.4017 });
        gmap.setZoom(13);
      }
    }

    function renderMapView() {
      gmap = null;
      if (gInfoWindow) {
        gInfoWindow.close();
        gInfoWindow = null;
      }
      clearMapMarkers();
      if (!state.activeDay) return;
      const content = document.getElementById("content");
      content.innerHTML = "";

      const shell = document.createElement("div");
      shell.className = "map-shell";
      shell.innerHTML = `
        <div class="map-top-bar">
          <div class="map-type-toggle">
            <button class="map-type-btn active" type="button" data-maptype="roadmap">地圖</button>
            <button class="map-type-btn" type="button" data-maptype="satellite">衛星</button>
          </div>
          <div class="map-legend" id="mapLegend">
            <span class="legend-item"><span style="color:#4ade80">●</span> 餐飲</span>
            <span class="legend-item"><span style="color:#60a5fa">●</span> 購物</span>
            <span class="legend-item"><span style="color:#fb923c">●</span> 觀光</span>
            <span class="legend-item"><span style="color:#f472b6">●</span> 交通</span>
          </div>
        </div>
        <div id="gmap"></div>
      `;
      content.appendChild(shell);

      shell.querySelectorAll(".map-type-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          shell.querySelectorAll(".map-type-btn").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          ensureMapInitialized();
          if (gmap) gmap.setMapTypeId(btn.dataset.maptype);
        });
      });

      updateMapMarkersForDay(state.activeDay);

      // Legend first-time highlight
      const seenKey = "tripPlanner_seenMapLegend_v1";
      if (!localStorage.getItem(seenKey)) {
        const legend = document.getElementById("mapLegend");
        if (legend) {
          legend.classList.add("pulse");
          setTimeout(() => legend.classList.remove("pulse"), 2000);
          localStorage.setItem(seenKey, "1");
        }
      }

      const legend = document.getElementById("mapLegend");
      if (legend) {
        legend.style.opacity = "1";
        legend.style.transition = "opacity 1s ease";
        clearTimeout(window._legendTimer);
        window._legendTimer = setTimeout(() => {
          legend.style.opacity = "0.3";
        }, 3000);

        legend.addEventListener("touchstart", () => {
          legend.style.opacity = "1";
          clearTimeout(window._legendTimer);
          window._legendTimer = setTimeout(() => {
            legend.style.opacity = "0.3";
          }, 3000);
        }, { passive: true });

        legend.addEventListener("mouseenter", () => {
          legend.style.opacity = "1";
          clearTimeout(window._legendTimer);
        });

        legend.addEventListener("mouseleave", () => {
          window._legendTimer = setTimeout(() => {
            legend.style.opacity = "0.3";
          }, 2000);
        });
      }
    }

    function render() {
      // 確保每個交通段都有 segments 陣列
      if (state.transportByDay) {
        for (const day of Object.keys(state.transportByDay)) {
          const list = (state.transportByDay[day] || []);
          if (!Array.isArray(list)) continue;
          list.forEach(t => {
            if (!t) return;
            // Firebase 把 segments 陣列變成物件，轉回來
            if (t.segments && !Array.isArray(t.segments)) {
              t.segments = Object.keys(t.segments)
                .sort((a,b) => Number(a)-Number(b))
                .map(k => t.segments[k]);
            }
            // 舊格式 main -> segments
            if (!t.segments || t.segments.length === 0) {
              if (t.main) {
                t.segments = [{
                  icon: t.main.icon || '',
                  mode: t.main.mode || '',
                  from: '',
                  to: '',
                  duration: t.main.duration || '',
                  cost: t.main.cost || ''
                }];
              } else {
                t.segments = [{
                  icon: '🚶', mode: '步行',
                  from: '', to: '',
                  duration: '15分鐘', cost: '免費'
                }];
              }
            }
          });
        }
      }

      if (!roomId) {
        renderRoomScreen();
        return;
      }
      if (state.activeDay === 0) {
        state.reorderMode = false;
      }
      setRoomHeaderUI();
      renderHeader();
      const subtabs = document.querySelector(".subtabs");
      if (subtabs) subtabs.style.display = state.activeDay === 0 ? "none" : "";
      const reorderBtn = document.getElementById("reorderBtn");
      if (reorderBtn) {
        reorderBtn.style.display = state.activeDay === 0 ? "none" : "";
        reorderBtn.textContent = state.reorderMode ? "✓ 完成排序" : "✎ 調整順序";
      }
      if (state.activeDay === 0) {
        renderOverview();
      } else if (state.activeView === "itinerary") {
        renderItinerary();
      } else {
        renderMapView();
      }
      if (pendingScrollItemId && state.activeDay > 0 && state.activeView === "itinerary") {
        const sid = pendingScrollItemId;
        pendingScrollItemId = null;
        requestAnimationFrame(() => {
          const el = document.querySelector(
            `[data-card-id="${String(sid).replace(/\\/g, "\\\\").replace(/"/g, '\\"')}"]`
          );
          if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
        });
      }
    }

        saveState();
        render();

    document.getElementById("spotDeleteBtn").addEventListener("click", () => {
      const day = modalCtx.day;
      if (!modalCtx.itemId) return;
      const list = dayItems(day);
      const idx = list.findIndex((i) => i.id === modalCtx.itemId);
      if (idx < 0) return;
      list.splice(idx, 1);

      // keep transport segments length roughly aligned
      const transports = dayTransports(day);
      if (transports.length > 0) {
        const tIdx = Math.min(idx, transports.length - 1);
        transports.splice(tIdx, 1);

      const cleaned = (transportModalCtx.segments || [])
        .map((s) => ({
          icon: String(s.icon || "").trim(),
          mode: String(s.mode || "").trim(),
          from: String(s.from || "").trim(),
          to: String(s.to || "").trim(),
          duration: String(s.duration || "").trim(),
          cost: String(s.cost || "").trim()
        }))
        .filter((s) => s.icon || s.mode || s.from || s.to || s.duration || s.cost);

      seg.segments = cleaned.length
        ? cleaned
        : [{ icon: "🚶", mode: "步行", from: "", to: "", duration: "", cost: "免費" }];
      delete seg.main;

      db.ref("rooms/" + roomId).on("value", (snapshot) => {
        const data = snapshot.val();
        if (data) {
          const normalized = normalizeFirebaseArrays(data);
          // Keep offline fallback in localStorage
          localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
          latestRemoteState = normalized;
          scheduleApplyRemote();
        }
      });

      const titleEl = document.getElementById("tripTitle");

      const input = document.createElement("input");
      input.className = "title-input";
      input.type = "text";
      input.value = current;

        const next = (input.value || "").trim() || "未命名行程";

        renderHeader();
        input.replaceWith(titleEl);

      `;

      let html = headerHtml;
      for (let d = 1; d <= state.days; d += 1) {
        const items = state.itineraryByDay?.[d] || [];

        const dayDate = (state.startDate ? (() => {
          const base = new Date(state.startDate + "T00:00:00");
          base.setDate(base.getDate() + (d - 1));
          return `${base.getMonth() + 1}/${base.getDate()}`;
        })() : "");
        const weekday = (() => {
          const base = state.startDate ? new Date(state.startDate + "T00:00:00") : new Date();
          base.setHours(0,0,0,0);
          base.setDate(base.getDate() + (d - 1));
          const w = ["日","一","二","三","四","五","六"][base.getDay()];
          return `星期${w}`;
        })();
        const title = state.startDate ? `第${d}天 · ${dayDate} ${weekday}` : `第${d}天 · ${weekday}`;

        html += `<div style="margin-top:14px;margin-bottom:10px;font-size:15px;font-weight:800;">${title}</div>`;

        items.forEach((item, idx) => {
          const note = item.note ? item.note.replace(/</g,"&lt;").replace(/>/g,"&gt;") : "";
          const best = item.bestTime ? item.bestTime.replace(/</g,"&lt;").replace(/>/g,"&gt;") : "";
          html += `
            <div class="card" style="margin:10px 0;">
              <div style="display:flex;justify-content:space-between;gap:10px;">
                <div style="min-width:52px;font-variant-numeric:tabular-nums;">${item.time || ""}</div>
                <div style="flex:1;">
                  <div style="font-size:16px;font-weight:800;">${item.title || ""}</div>
                  <div style="font-size:12px;color:#333;">${item.subtitle || ""}</div>
                </div>
              </div>
              <div style="margin-top:8px;font-size:12px;color:#111;">
                <span style="display:inline-block;border:1px solid #ccc;border-radius:999px;padding:2px 8px;margin-right:6px;">${item.type || ""}</span>
                <span style="margin-right:8px;">停留：${item.stay || ""}</span>
                <span>費用：${item.cost || ""}</span>
              </div>
              <div class="detail open" style="max-height:none;opacity:1;margin-top:10px;">
                <div class="detail-inner" style="border-top:1px solid #ddd;padding-top:8px;color:#111;">
                  ${best ? `<div style="margin-top:4px;"><span style="font-weight:700;">最佳時段：</span>${best}</div>` : ""}
                  ${note ? `<div style="margin-top:6px;white-space:pre-wrap;"><span style="font-weight:700;">備註：</span>${note}</div>` : ""}
                </div>
              </div>
            </div>
          `;

          const seg = (state.transportByDay?.[d] || [])[idx];
          if (idx < items.length - 1 && seg) {
            const segments = Array.isArray(seg.segments)
              ? seg.segments
              : seg.main
                ? [{
                  icon: seg.main.icon || "",
                  mode: seg.main.mode || "",
                  from: "",
                  to: "",
                  duration: seg.main.duration || "",
                  cost: seg.main.cost || ""
                }]
                : [];
            const lines = segments.map((s) =>
              `${s.icon || ""} ${s.mode || ""} ${s.duration || ""} ${s.cost || ""}`.replace(/\s+/g, " ").trim()
            ).join("<br/>");
            html += `
              <div class="transport" style="margin:8px 6px;padding-left:10px;">
                <div style="display:flex;gap:8px;align-items:center;color:#111;">
                  <div style="font-variant-numeric:tabular-nums;">${lines}</div>
                </div>
              </div>
            `;
          }
        });

        const totalPerPerson = items.reduce((sum, i) => sum + (typeof i.cost === "string" && i.cost.includes("¥") ? (Number((i.cost.replace(/,/g,"").match(/¥\s*([\d.]+)/)||[])[1])||0) : 0), 0);
        html += `<div class="day-total" style="margin:12px 4px 0;padding-top:10px;border-top:1px solid #ddd;text-align:right;color:#111;">當日費用小計 ¥${totalPerPerson.toLocaleString("en-US")}／人</div>`;
      }

      // Switch to a print-only view (do not mutate state / no saveState)
      content.innerHTML = html;
      window.scrollTo(0, 0);

      const restore = () => {
        content.innerHTML = prev.html;
        state.activeDay = prev.activeDay;
        state.activeView = prev.activeView;
        state.reorderMode = prev.reorderMode;
        render();
      };
      window.addEventListener("afterprint", restore, { once: true });
      setTimeout(() => window.print(), 0);
    });

    render();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
